name: Bug report
description: Something that works should but doesn't.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands. Include `glam --version` output.
      render: shell
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS 15 / Windows 11 / Ubuntu 24.04 — Node version
    validations:
      required: true
