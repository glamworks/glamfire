name: RFC
description: A new subsystem, public interface, or spec change.
labels: ["rfc"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem & context
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed contract
      description: The interface/behavior you propose. Reference SPEC.md sections.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
