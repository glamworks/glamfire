# glamfire configuration — example project config (./glam.toml).
#
# This is the layered, zod-validated config surface specified in SPEC §6. Copy
# the bits you need into ./glam.toml (project) or ~/.glam/config.toml (user).
# Precedence, lowest -> highest:
#   built-in defaults < ~/.glam/config.toml < ./glam.toml < env vars < CLI flags
#
# SECRETS ARE NEVER WRITTEN HERE. A provider declares *where* its API key comes
# from (an env var or the OS keychain); the key value lives in the env/keychain,
# never in this file, never in logs, never in the brain store (SPEC §8).

# Config schema version (for forward-compatible migrations).
version = 1

# Headline default model id (provider-qualified). GLM 5.2 on Fireworks is the
# cheap, excellent workhorse for center-of-distribution work.
model = "accounts/fireworks/models/glm-5p2"

# ---------------------------------------------------------------------------
# Providers — base URL, known model ids, and credential *reference* per provider.
#
# Wondering what to list here? Run `glam models` — the evergreen landscape view
# of top open-weight models across respected US-hosted providers, with USD/1M
# prices, served quantization (FP8 vs FP4 caveats), context windows, capability
# tokens, and the date each price was verified. `glam models --refresh` pulls
# CURRENT prices from provider model APIs (needs the provider key) and reports
# changes explicitly; the adapters price from the very same catalog, so routing
# cost decisions and this view can never drift apart.
# ---------------------------------------------------------------------------
[providers.fireworks]
baseUrl = "https://api.fireworks.ai/inference/v1"
# Three verified serverless models ride the same key (research/25):
#   glm-5p2           — GLM-5.2, the default workhorse (FP8, 1M ctx, thinking)
#   deepseek-v4-flash — budget tier: cheapest capable 1M-ctx model ($0.14/$0.28)
#   deepseek-v4-pro   — open escalation tier (FP8, 1M ctx, $1.74/$3.48, MIT)
models = [
  "accounts/fireworks/models/glm-5p2",
  "accounts/fireworks/models/deepseek-v4-flash",
  "accounts/fireworks/models/deepseek-v4-pro",
]
# Resolve the key from an environment variable:
credential = { env = "FIREWORKS_API_KEY" }

# Together AI — second OpenAI-compatible inference provider (research/23). A
# respected, US-hosted (SOC 2 Type 2 + HIPAA) peer to Fireworks with an explicit
# Zero Data Retention opt-in. Serves BOTH open-weight models below. Uncomment to
# make Qwen-on-Together (and a second GLM-5.2 host) routing candidates.
#
# HONESTY CAVEATS (research/23, recorded per model in the adapter):
#   - zai-org/GLM-5.2 is served at **FP4** here — a real quantization downgrade
#     vs Fireworks/Baseten FP8. Prefer Fireworks for GLM quality; use Together's
#     GLM only as a cheaper/secondary host.
#   - Qwen/Qwen3-Coder-Next (FP8, 256K, non-thinking, native tool-calling) is the
#     cheaper/faster coding-agent second tier, served via a DEDICATED endpoint.
#   - deepseek-ai/DeepSeek-V4-Pro (native FP4+FP8, thinking) is the SECONDARY
#     DeepSeek host — 512K ctx as served here vs Fireworks' 1M, and pricier
#     ($2.10/$4.40 vs $1.74/$3.48). Prefer Fireworks for DeepSeek (research/25).
# [providers.together]
# baseUrl = "https://api.together.xyz/v1"
# models = ["zai-org/GLM-5.2", "Qwen/Qwen3-Coder-Next", "deepseek-ai/DeepSeek-V4-Pro"]
# credential = { env = "TOGETHER_API_KEY" }

[providers.anthropic]
baseUrl = "https://api.anthropic.com"
models = ["claude-sonnet-4-5"]
# Or resolve from the OS keychain (macOS Keychain / libsecret / Windows Cred Mgr):
credential = { keychain = { service = "glamfire", account = "anthropic" } }

[providers.openai]
baseUrl = "https://api.openai.com/v1"
models = ["gpt-5"]
credential = { env = "OPENAI_API_KEY" }

# Fully local, fully private operation via an OpenAI-compatible server (vLLM/SGLang).
[providers.local]
baseUrl = "http://localhost:8000/v1"
models = []
# Local servers often need no key; omit `credential` entirely.

# ---------------------------------------------------------------------------
# Routing policy (declarative) — the @glamfire/router contract (SPEC §5.3).
# Rules are evaluated top-to-bottom; the first whose conditions match wins. The
# router then filters that rule's `candidates` (ordered cheapest-first) by the
# adapter-declared capabilities in `requires` and the budget in `maxUsd`, and
# picks the cheapest survivor. Condition fields: distribution, minConfidence,
# maxConfidence, requires, maxUsd.
# ---------------------------------------------------------------------------
[routing]
# Model used when no rule matches.
default = "accounts/fireworks/models/glm-5p2"

# Center-of-distribution work -> GLM 5.2 on Fireworks (cheap workhorse).
[[routing.rules]]
distribution = "center"
candidates = ["accounts/fireworks/models/glm-5p2"]

# DeepSeek tiering on the same Fireworks key (research/25). Candidates are
# ordered cheapest-first; the router filters by `requires` and picks the
# cheapest survivor, so V4-Flash ($0.14/$0.28 — the cheapest capable 1M-context
# model) wins center work, with GLM-5.2 and DeepSeek-V4-Pro ($1.74/$3.48, the
# open escalation tier) as stronger fallbacks. Uncomment to prefer the budget
# tier; put this rule ABOVE the plain GLM center rule so it matches first.
# [[routing.rules]]
# distribution = "center"
# requires = ["tool_calling", "long_context"]
# candidates = [
#   "accounts/fireworks/models/deepseek-v4-flash",
#   "accounts/fireworks/models/glm-5p2",
#   "accounts/fireworks/models/deepseek-v4-pro",
# ]

# Edge / low-confidence work -> escalate to a frontier model, falling back to GLM.
[[routing.rules]]
distribution = "edge"
maxConfidence = 0.5
requires = ["tool_calling", "long_context"]
candidates = ["claude-sonnet-4-5", "accounts/fireworks/models/glm-5p2"]

# Tool-heavy coding agent loops -> prefer the cheap/fast coding model
# (Qwen3-Coder-Next on Together, FP8, native tool-calling) and fall back to the
# GLM-5.2 workhorse. Candidates are ordered cheapest-first; the router filters by
# the capabilities in `requires` and picks the cheapest survivor (SPEC §5.3).
# Requires `providers.together` above to be uncommented so the model is wired.
# [[routing.rules]]
# distribution = "center"
# requires = ["tool_calling", "long_context"]
# candidates = ["Qwen/Qwen3-Coder-Next", "accounts/fireworks/models/glm-5p2"]

# ---------------------------------------------------------------------------
# Permissions — default verdict per privilege class, enforced by the engine, not
# the model (SPEC §5.1). One of: "allow" | "ask" | "deny". Least-privilege.
# ---------------------------------------------------------------------------
[permissions]
read = "allow"
write = "ask"
network = "ask"
exec = "deny"
# Optional per-tool-name overrides (highest precedence in the gate):
# tools = { read_file = "allow", run_command = "deny" }

# ---------------------------------------------------------------------------
# Sandbox — allowlists the engine enforces for tool execution (SPEC §8).
# ---------------------------------------------------------------------------
[sandbox]
filesystem = ["."]          # paths tools may touch
network = []                # hosts tools may reach
command = []                # commands exec tools may run

# ---------------------------------------------------------------------------
# Run defaults — applied to every run unless overridden by env or CLI flags.
# ---------------------------------------------------------------------------
[run]
effort = "high"             # GLM reasoning effort: "high" | "max"
tier = "standard"           # Fireworks service tier
temperature = 0.2

[run.budget]
maxUsd = 0.5                # hard spend ceiling per run
maxSteps = 8               # plan->act->observe loop cap
# maxTokens = 100000

# ---------------------------------------------------------------------------
# Monitoring, usage & billing — every real run is appended to the local, owned
# usage ledger (~/.glam/usage.jsonl; JSONL, portable, greppable). Inspect it
# with `glam usage` (offline, no key needed). These keys add budget alerting on
# top: `glam run` warns when month-to-date spend crosses warnAtPct% of the
# monthly budget, and `glam usage` renders a budget bar. Alerting only — runs
# are never blocked (per-run hard ceilings live in [run.budget]).
# ---------------------------------------------------------------------------
[usage]
# monthlyBudgetUsd = 25.0   # soft monthly spend budget in USD (opt-in)
warnAtPct = 80              # warn when month-to-date spend crosses this %

# ---------------------------------------------------------------------------
# Memory — the brain in the run loop (SPEC §5.2). Every `glam run` first
# recalls relevant records from the project's local brain store (offline hybrid
# retrieval: vector + keyword + recency + provenance) and packs the top hits —
# under a hard token cap, with record ids and sources — into the model context;
# afterward a structured episode (task, outcome, decisions, files touched,
# models, cost) is written back so future runs remember. Local-first and owned:
# the store is a single portable SQLite file, never uploaded, exportable to
# JSONL. Zero recalls from a fresh store is normal, not an error. Disable
# per-run with `--no-memory` or globally here / via GLAM_MEMORY=false.
# ---------------------------------------------------------------------------
[memory]
enabled = true              # master switch for recall + episode capture
# store = ".glam/brain.db"  # brain store path (default: <project>/.glam/brain.db)
recallLimit = 6             # top-K records considered per run
recallTokenBudget = 1200    # hard token cap for the packed recall block
